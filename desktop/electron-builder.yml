appId: com.aurora.agent
productName: Aurora Agent
copyright: "Copyright © 2026 Aurora"

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json

extraResources:
  - from: ../backend/
    to: backend
    filter:
      - "**/*"
      - "!__pycache__/**"
      - "!*.pyc"
      - "!.pytest_cache/**"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: true
  perMachine: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Aurora Agent
  installerIcon: build/icon.ico

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  icon: build/icon.png

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  icon: build/icon.icns

fileAssociations:
  - name: Aurora Project
    ext: aurora
    description: Aurora Agent Project File
    role: Editor
